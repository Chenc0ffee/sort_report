<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>堆積排序法範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>堆積排序法範例</h1>
        <p>輸入一串數字（用逗號分隔），點擊排序按鈕來執行堆積排序。</p>
        <input type="text" id="inputArray" placeholder="例如: 5,3,8,4,2" value="5,3,8,4,2">
        <button onclick="heapSortHandler()">排序</button>
        <div id="output"></div>
    </div>

    <script>
        function heapSortHandler() {
            const input = document.getElementById('inputArray').value;
            const arr = input.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
            const output = document.getElementById('output');

            if (arr.length === 0) {
                output.innerHTML = '請輸入有效的數字。';
                return;
            }

            output.innerHTML = '<p>原始陣列: ' + arr.join(', ') + '</p>';
            heapSort(arr);
            output.innerHTML += '<p>排序後陣列: ' + arr.join(', ') + '</p>';
        }

        function heapSort(arr) {
            const n = arr.length;

            // 建構最大堆
            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                heapify(arr, n, i);
            }

            // 從堆中提取元素
            for (let i = n - 1; i > 0; i--) {
                // 將根節點（最大值）與最後一個元素交換
                [arr[0], arr[i]] = [arr[i], arr[0]];

                // 重新調整堆
                heapify(arr, i, 0);
            }
        }

        function heapify(arr, n, i) {
            let largest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;

            // 如果左子節點大於根節點
            if (left < n && arr[left] > arr[largest]) {
                largest = left;
            }

            // 如果右子節點大於根節點
            if (right < n && arr[right] > arr[largest]) {
                largest = right;
            }

            // 如果最大值不是根節點
            if (largest !== i) {
                [arr[i], arr[largest]] = [arr[largest], arr[i]];

                // 遞歸調整受影響的子樹
                heapify(arr, n, largest);
            }
        }
    </script>
</body>
</html>

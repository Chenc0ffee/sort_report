<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Demo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; }
        input, button { margin: 0.5rem 0; }
        #output { margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>Bubble Sort in JavaScript</h1>
    <p>Enter numbers separated by commas:</p>
    <input id="numbers" type="text" placeholder="e.g. 5,3,8,1" size="30" />
    <br />
    <button onclick="runBubble()">Sort</button>
    <div id="output"></div>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                }
            }
            return arr;
        }

        function runBubble() {
            const input = document.getElementById('numbers').value;
            const arr = input.split(',').map(Number);
            const sorted = bubbleSort(arr);
            document.getElementById('output').textContent =
                'Sorted result: ' + sorted.join(', ');
        }
    </script>
</body>
</html>
